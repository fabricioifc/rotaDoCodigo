services:
  web:
    # image: rota-do-codigo-prod
    container_name: rota-do-codigo-web
    build:
      context: .
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    env_file:
      - .env.prod
    ports:
      - "${APP_PORT:-8080}:80"
    restart: unless-stopped
    networks:
      - fabrica-network

networks:
  fabrica-network:
    external: true