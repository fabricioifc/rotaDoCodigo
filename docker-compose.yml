services:
  web:
    # image: rota-do-codigo-dev
    build:
      context: .
      target: dev
    env_file:
      - .env.dev
    environment:
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port ${VITE_PORT:-5173}
